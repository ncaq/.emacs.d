name: check

on:
  push:
    branches: [master, main]
  pull_request:
  merge_group:

permissions:
  contents: read # リポジトリコンテンツの読み取り
  id-token: write # niks3 OIDC認証

jobs:
  nix-fast-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ncaq/nix-composite-action@b1d430ba6622e294023e8c8bb7ac9c0f5942a1b8 # v3.0.2
      - run: nix run '.#nix-fast-build' -- --option eval-cache false --no-link --skip-cached --no-nom
